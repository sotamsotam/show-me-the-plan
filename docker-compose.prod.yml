# Production — pull pre-built images from GHCR (no build on VPS).
#
# Prerequisites:
#   1. GitHub Actions "Publish Docker images" workflow has run on main.
#   2. VPS: docker login ghcr.io (read:packages PAT if repo is private).
#   3. Root .env with SMP_*_IMAGE and all runtime secrets (see .env.production.example).
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-strapi}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USERNAME:-strapi} -d ${DATABASE_NAME:-strapi}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  strapi:
    image: ${SMP_STRAPI_IMAGE:?SMP_STRAPI_IMAGE is required}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS:?APP_KEYS is required}
      API_TOKEN_SALT: ${API_TOKEN_SALT:?API_TOKEN_SALT is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:?TRANSFER_TOKEN_SALT is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DATABASE_SSL: 'false'
      NEIS_KEY: ${NEIS_KEY:-}
      NEIS_CACHE_ENABLED: ${NEIS_CACHE_ENABLED:-true}
      NEIS_CACHE_TTL_HOURS: ${NEIS_CACHE_TTL_HOURS:-12}
      NEIS_CACHE_MAX_ENTRIES: ${NEIS_CACHE_MAX_ENTRIES:-2000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER:-}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY:-}
      EMAIL_DEFAULT_FROM: ${EMAIL_DEFAULT_FROM:-}
      EMAIL_DEFAULT_NAME: ${EMAIL_DEFAULT_NAME:-Show Me The Plan}
      FRONTEND_URL: ${FRONTEND_URL:-${NEXTAUTH_URL:-http://localhost}}
      BILLING_INTERNAL_SECRET: ${BILLING_INTERNAL_SECRET:?BILLING_INTERNAL_SECRET is required}
      BILLING_ENCRYPTION_KEY: ${BILLING_ENCRYPTION_KEY:-}
      OPS_INTERNAL_SECRET: ${OPS_INTERNAL_SECRET:?OPS_INTERNAL_SECRET is required}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      UPLOAD_PROVIDER: ${UPLOAD_PROVIDER:-local}
      UPLOAD_S3_ACCESS_KEY_ID: ${UPLOAD_S3_ACCESS_KEY_ID:-}
      UPLOAD_S3_SECRET_ACCESS_KEY: ${UPLOAD_S3_SECRET_ACCESS_KEY:-}
      UPLOAD_S3_REGION: ${UPLOAD_S3_REGION:-auto}
      UPLOAD_S3_ENDPOINT: ${UPLOAD_S3_ENDPOINT:-}
      UPLOAD_S3_BUCKET: ${UPLOAD_S3_BUCKET:-}
      UPLOAD_S3_BASE_URL: ${UPLOAD_S3_BASE_URL:-}
      UPLOAD_S3_ROOT_PATH: ${UPLOAD_S3_ROOT_PATH:-}
      UPLOAD_S3_ACL: ${UPLOAD_S3_ACL:-}
      UPLOAD_S3_FORCE_PATH_STYLE: ${UPLOAD_S3_FORCE_PATH_STYLE:-false}
    volumes:
      - strapi_uploads:/opt/app/public/uploads

  frontend:
    image: ${SMP_FRONTEND_IMAGE:?SMP_FRONTEND_IMAGE is required}
    restart: unless-stopped
    depends_on:
      - strapi
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      STRAPI_URL: http://strapi:1337
      PORTONE_API_SECRET: ${PORTONE_API_SECRET:-}
      NEXT_PUBLIC_PORTONE_STORE_ID: ${NEXT_PUBLIC_PORTONE_STORE_ID:-}
      NEXT_PUBLIC_PORTONE_CHANNEL_KEY: ${NEXT_PUBLIC_PORTONE_CHANNEL_KEY:-}
      BILLING_INTERNAL_SECRET: ${BILLING_INTERNAL_SECRET:?BILLING_INTERNAL_SECRET is required}
      BILLING_CRON_SECRET: ${BILLING_CRON_SECRET:-}
      OPS_INTERNAL_SECRET: ${OPS_INTERNAL_SECRET:?OPS_INTERNAL_SECRET is required}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      PORTONE_WEBHOOK_SKIP_VERIFY: ${PORTONE_WEBHOOK_SKIP_VERIFY:-true}
      PORTONE_WEBHOOK_SECRET: ${PORTONE_WEBHOOK_SECRET:-}
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-${NEXTAUTH_URL}}
      NEXT_PUBLIC_UPLOAD_BASE_URL: ${NEXT_PUBLIC_UPLOAD_BASE_URL:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  strapi_uploads:
  caddy_data:
  caddy_config:
