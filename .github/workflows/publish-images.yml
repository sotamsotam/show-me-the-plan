name: Publish Docker images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image prefix
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_PREFIX=ghcr.io/${owner}/show-me-the-plan" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_PORTONE_STORE_ID=${{ vars.NEXT_PUBLIC_PORTONE_STORE_ID }}
            NEXT_PUBLIC_PORTONE_CHANNEL_KEY=${{ vars.NEXT_PUBLIC_PORTONE_CHANNEL_KEY }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ vars.VAPID_PUBLIC_KEY }}
            NEXT_PUBLIC_STRAPI_URL=${{ vars.NEXT_PUBLIC_STRAPI_URL }}
            NEXT_PUBLIC_UPLOAD_BASE_URL=${{ vars.NEXT_PUBLIC_UPLOAD_BASE_URL }}
            NEXT_PUBLIC_CONTACT_EMAIL=${{ vars.NEXT_PUBLIC_CONTACT_EMAIL }}
            NEXT_PUBLIC_REPRESENTATIVE_NAME=${{ vars.NEXT_PUBLIC_REPRESENTATIVE_NAME }}
            NEXT_PUBLIC_BUSINESS_REG_NO=${{ vars.NEXT_PUBLIC_BUSINESS_REG_NO }}
            NEXT_PUBLIC_BUSINESS_ADDRESS=${{ vars.NEXT_PUBLIC_BUSINESS_ADDRESS }}

  publish-strapi:
    name: Strapi image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image prefix
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_PREFIX=ghcr.io/${owner}/show-me-the-plan" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-strapi
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
